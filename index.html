<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SJRI Price Card</title>


<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#1a2332">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SJRI Price">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Baloo+2:wght@600;700&display=swap');
:root{
  --steel:#1a2332; --steel-mid:#243447; --steel-light:#2e4057;
  --gold:#c9a84c; --gold-light:#e8c96e; --gold-pale:#fdf6e3;
  --cream:#f7f8fa; --white:#fff;
  --danger:#e74c3c; --success:#27ae60; --warning:#f39c12;
  --text:#1a2332; --text-mid:#4a5568; --text-light:#9aa5b4;
  --border:#e2e8f0; --shadow:0 1px 8px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);height:100%;overscroll-behavior:none;}

/* ── LOGIN ── */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--steel) 0%,var(--steel-light) 100%);padding:20px;}
.login-box{background:var(--white);border-radius:20px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.login-logo{width:180px;height:130px;background:white;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;overflow:hidden;}
.login-title{font-family:'Baloo 2',sans-serif;font-size:20px;font-weight:700;color:var(--steel);text-align:center;margin-bottom:2px;}
.login-sub{font-size:12px;color:var(--text-light);text-align:center;margin-bottom:24px;}
.login-box input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;margin-bottom:12px;outline:none;font-family:'Inter',sans-serif;transition:border .2s;}
.login-box input:focus{border-color:var(--gold);}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--steel),var(--steel-light));color:var(--gold-light);border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.login-error{color:var(--danger);font-size:12px;margin-top:8px;text-align:center;}

/* ── LAYOUT ── */
#appPage{display:none;min-height:100vh;display:none;flex-direction:column;}
#appPage.visible{display:flex;}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,var(--steel),var(--steel-light));display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:52px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.2);flex-shrink:0;}
.hdr-brand{display:flex;align-items:center;gap:9px;}
.hdr-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--steel);font-family:'Baloo 2',sans-serif;}
.hdr-title{font-family:'Baloo 2',sans-serif;font-size:15px;font-weight:700;color:var(--white);line-height:1.2;}
.hdr-sub{font-size:10px;color:var(--gold-light);font-weight:400;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.role-badge{background:rgba(201,168,76,.2);border:1px solid var(--gold);color:var(--gold-light);padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.btn-logout{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:var(--white);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;}

/* ── TABS ── */
.tabs{background:var(--white);border-bottom:2px solid var(--border);display:flex;flex-shrink:0;}
.tab-btn{flex:1;padding:11px 8px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-mid);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;font-family:'Inter',sans-serif;white-space:nowrap;}
.tab-btn.active{color:var(--steel);border-bottom-color:var(--gold);font-weight:700;}

/* ── SCROLL AREA ── */
.scroll-area{flex:1;overflow-y:auto;padding:12px;}

/* ── ADMIN MARGIN CARD ── */
.margin-card{background:linear-gradient(135deg,var(--steel),var(--steel-light));border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;box-shadow:var(--shadow);}
.margin-card h3{font-size:13px;font-weight:600;color:var(--white);margin-bottom:2px;}
.margin-card p{font-size:11px;color:rgba(255,255,255,.5);}
.margin-display{font-size:32px;font-weight:700;color:var(--gold-light);line-height:1;}
.margin-sub{font-size:10px;color:rgba(255,255,255,.4);text-align:right;margin-top:2px;}

/* ── ADMIN TABLE CARD ── */
.a-card{background:var(--white);border-radius:12px;box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;}
.a-card-hdr{background:var(--steel);color:var(--gold-light);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;font-family:'Baloo 2',sans-serif;font-size:14px;font-weight:600;}
.a-row{display:grid;grid-template-columns:1fr 52px 72px 60px 32px;gap:6px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;}
.a-row:last-child{border-bottom:none;}
.a-row-hdr{display:grid;grid-template-columns:1fr 52px 72px 60px 32px;gap:6px;padding:6px 12px 4px;font-size:10px;font-weight:600;color:var(--text-light);letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.a-prod-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.3;}
.a-base{font-size:12px;font-weight:600;color:var(--text-mid);text-align:center;}
.pct-inp{width:100%;padding:5px 4px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;font-family:'Inter',sans-serif;text-align:center;outline:none;}
.pct-inp:focus{border-color:var(--gold);}
.a-sell{font-size:13px;font-weight:700;color:var(--success);text-align:center;}
.btn-del{background:none;border:none;color:#ddd;cursor:pointer;font-size:15px;padding:2px;border-radius:4px;transition:color .2s;}
.btn-del:hover,.btn-del:active{color:var(--danger);}
.btn-add-cat{background:rgba(201,168,76,.15);color:var(--gold-light);border:1px solid rgba(201,168,76,.4);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-add-main{display:block;width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--steel);border:none;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:4px;}

/* ── SALESMAN SECTION ── */
.s-section{background:var(--white);border-radius:12px;box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;}
.s-hdr{background:var(--steel);color:var(--gold-light);padding:9px 14px;font-family:'Baloo 2',sans-serif;font-size:14px;font-weight:600;}
.s-body{padding:8px 10px 10px;}
.s-col-hdr{display:grid;grid-template-columns:1fr 58px 60px 54px 60px 30px;gap:5px;padding:4px 2px 5px;font-size:9px;font-weight:600;color:var(--text-light);letter-spacing:.3px;text-transform:uppercase;border-bottom:1px solid var(--border);margin-bottom:4px;}
.s-row{display:grid;grid-template-columns:1fr 58px 60px 54px 60px 30px;gap:5px;align-items:center;padding:5px 2px;border-bottom:1px solid #f0f2f5;}
.s-row:last-child{border-bottom:none;}
.s-select{width:100%;padding:7px 6px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;outline:none;background:var(--white);color:var(--text);}
.s-select:focus{border-color:var(--gold);}
.s-base{text-align:center;font-size:12px;font-weight:600;color:var(--text-mid);background:#f4f6fa;border-radius:6px;padding:7px 3px;}
.s-sell-inp{width:100%;padding:7px 4px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:700;text-align:center;color:var(--success);font-family:'Inter',sans-serif;outline:none;}
.s-sell-inp:focus{border-color:var(--gold);}
.s-sell-inp:disabled{background:#f4f6fa;color:var(--text-light);}
.s-qty-inp{width:100%;padding:7px 4px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;text-align:center;color:var(--text);font-family:'Inter',sans-serif;outline:none;}
.s-qty-inp:focus{border-color:var(--gold);}
.s-qty-inp:disabled{background:#f4f6fa;color:var(--text-light);}
.s-total{text-align:center;font-size:12px;font-weight:700;color:var(--steel);}
.s-add-btn{width:28px;height:28px;background:none;border:2px dashed var(--gold);color:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;font-weight:700;}
.s-rem-btn{width:28px;height:28px;background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;border-radius:6px;}
.s-rem-btn:active{color:var(--danger);}
.s-more-btn{background:none;border:1.5px dashed var(--gold);color:var(--gold);padding:5px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px;display:inline-block;}

/* ── SUMMARY ── */
.summary{background:linear-gradient(135deg,var(--steel),var(--steel-mid));border-radius:14px;padding:16px 18px;margin-top:10px;box-shadow:0 4px 16px rgba(26,35,50,.2);}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.sum-item{text-align:center;}
.sum-label{font-size:9px;font-weight:600;color:rgba(255,255,255,.45);letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px;}
.sum-val{font-size:18px;font-weight:700;color:var(--white);}
.deal-msg{text-align:center;padding:9px 14px;border-radius:10px;font-size:13px;font-weight:700;}

/* ── RESET BTN ── */
.btn-reset{background:linear-gradient(135deg,#e74c3c,#c0392b);color:var(--white);border:none;padding:8px 16px;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}

/* ── SECTION HEADER ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-family:'Baloo 2',sans-serif;font-size:17px;font-weight:700;color:var(--steel);display:flex;align-items:center;gap:6px;}
.sec-title::before{content:'';width:3px;height:18px;background:linear-gradient(var(--gold),var(--gold-light));border-radius:2px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:100;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal h3{font-family:'Baloo 2',sans-serif;font-size:18px;font-weight:700;color:var(--steel);margin-bottom:16px;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--text-mid);margin-bottom:5px;}
.fg input,.fg select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:'Inter',sans-serif;outline:none;background:var(--white);}
.fg input:focus,.fg select:focus{border-color:var(--gold);}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.btn-p{flex:1;padding:12px;background:linear-gradient(135deg,var(--steel),var(--steel-light));color:var(--gold-light);border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-s{flex:1;padding:12px;background:var(--cream);color:var(--text-mid);border:1.5px solid var(--border);border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--steel);color:var(--white);padding:11px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .3s;border-left:4px solid var(--gold);white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

function getLabel(p,cat){
  if(cat==='frame') return `${p.brand} ${p.gsm}GSM ${p.thickness}mm`;
  if(cat==='steel') return `${p.grade} | ${p.size}`;
  if(cat==='kabje') return `${p.type} | ${p.size}`;
  if(cat==='pvc')   return `${p.type} | ${p.size}`;
  return p.name||'Product';
}
function findP(cat,pid){return(products[cat]||[]).find(x=>x.id===pid)||null;}
function defSell(p){return Math.round(p.baseRate*(1+(p.pct||0)/100));}
function ordCats(){
  return['frame','steel','kabje','pvc','other',
    ...Object.keys(products).filter(k=>!['frame','steel','kabje','pvc','other'].includes(k))
  ].filter(k=>products[k]&&products[k].length>0);
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function activateUser(role){
  currentUser=role;
  document.getElementById('loginPage').style.display='none';
  document.getElementById('appPage').classList.add('visible');
  document.getElementById('roleBadge').textContent=currentUser==='admin'?'ADMIN':currentUser==='manager'?'MANAGER':'SALESMAN';
  document.getElementById('hdrSub').textContent=currentUser==='admin'?'Admin Panel':currentUser==='manager'?'Manager View':'Rate Card';
  setupTabs(); loadData();
}

window.doLogin=function(){
  const id=document.getElementById('loginId').value.trim();
  const pw=document.getElementById('loginPass').value;
  if(CREDS[id]&&CREDS[id].pass===pw){
    localStorage.setItem('sjri_user', id);
    activateUser(CREDS[id].role);
  } else {
    document.getElementById('loginError').textContent='Galat ID ya Password!';
  }
};
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')window.doLogin();});

window.doLogout=function(){

  currentUser=null;

  document.getElementById('appPage').classList.remove('visible');

};

// ── FIREBASE ──
async function loadData(){
  try{
    const snap=await getDoc(doc(db,'priceCard','config'));
    if(snap.exists()){
      const d=snap.data();
      products=d.products??DEFAULT_PRODUCTS;
      categoryMeta=d.categoryMeta??DEFAULT_META;
      mgrProducts=d.mgrProducts??JSON.parse(JSON.stringify(DEFAULT_MGR_PRODUCTS));
    } else {
      products=JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
      categoryMeta=JSON.parse(JSON.stringify(DEFAULT_META));
      mgrProducts=JSON.parse(JSON.stringify(DEFAULT_MGR_PRODUCTS));
      await saveFB();
    }
  }catch{
    products=JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
    categoryMeta=JSON.parse(JSON.stringify(DEFAULT_META));
    mgrProducts=JSON.parse(JSON.stringify(DEFAULT_MGR_PRODUCTS));
  }
  initRows();
  const unsub=onSnapshot(doc(db,'priceCard','config'),snap=>{
    if(snap.exists()){
      const d=snap.data();
      products=d.products??DEFAULT_PRODUCTS;
      categoryMeta=d.categoryMeta??DEFAULT_META;
      mgrProducts=d.mgrProducts??JSON.parse(JSON.stringify(DEFAULT_MGR_PRODUCTS));
      renderAll();
    }
  });
  unsubscribers.push(unsub);
  renderAll();
}
async function saveFB(){await setDoc(doc(db,'priceCard','config'),{products,categoryMeta,mgrProducts,updatedAt:new Date().toISOString()});}

function initRows(){
  rows={};
  ordCats().forEach(cat=>{rows[cat]=[{rowId:cat+'-r0',productId:'',sellingRate:'',qty:1}];});
}

function renderAll(){renderAdmin();renderManager();renderSalesman();computeMargin();}

// ── ADMIN ──
function renderAdmin(){
  const c=document.getElementById('adminTables');
  let h='';
  ordCats().forEach(cat=>{
    const meta=categoryMeta[cat]||{label:cat};
    h+=`<div class="a-card">
      <div class="a-card-hdr"><span>${meta.label}</span>
        <button class="btn-add-cat" onclick="openAddModal('${cat}')">+ Add</button>
      </div>
      <div class="a-row-hdr"><div>Product</div><div>Base</div><div>Margin%</div><div>Sell</div><div></div></div>`;
    (products[cat]||[]).forEach((p,i)=>{
      const sell=Math.round(p.baseRate*(1+(p.pct||0)/100));
      h+=`<div class="a-row">
        <div class="a-prod-name">${getLabel(p,cat)}</div>
        <div class="a-base">₹${p.baseRate}</div>
        <div><input class="pct-inp" type="number" min="0" max="500" step="0.5" value="${p.pct||0}"
          onchange="updPct('${cat}',${i},this.value)"></div>
        <div class="a-sell">₹${sell}</div>
        <button class="btn-del" onclick="delProd('${cat}',${i})">🗑</button>
      </div>`;
    });
    h+=`</div>`;
  });
  c.innerHTML=h;
  // Add manager rates section below
  c.innerHTML += renderAdminMgrSection();
}
window.updPct=async function(cat,i,v){
  products[cat][i].pct=parseFloat(v)||0;
  computeMargin();await saveFB();toast('✓ Margin updated');renderAdmin();
};
window.delProd=async function(cat,i){
  if(!confirm('Delete?'))return;
  products[cat].splice(i,1);await saveFB();toast('Deleted');
};
function computeMargin(){
  let tb=0,ts=0;
  for(const cat in products)(products[cat]||[]).forEach(p=>{tb+=p.baseRate;ts+=Math.round(p.baseRate*(1+(p.pct||0)/100));});
  const m=tb>0?((ts-tb)/tb*100):0;
  const el=document.getElementById('globalMarginDisplay');
  if(el)el.textContent=m.toFixed(1);
}

// ── SALESMAN ──
function renderSalesman(){
  if(!Object.keys(rows).length)initRows();
  const c=document.getElementById('salesmanSections');
  let h='';
  ordCats().forEach(cat=>{
    if(!rows[cat])rows[cat]=[{rowId:cat+'-r0',productId:'',sellingRate:'',qty:1}];
    const meta=categoryMeta[cat]||{label:cat};
    h+=`<div class="s-section"><div class="s-hdr">${meta.label}</div><div class="s-body">
      <div class="s-col-hdr"><div>Product</div><div>Base</div><div>Sell</div><div>Qty</div><div>Total</div><div></div></div>`;
    rows[cat].forEach((row,idx)=>{
      const p=row.productId?findP(cat,row.productId):null;
      const br=p?p.baseRate:null;
      const sr=row.sellingRate!==''?row.sellingRate:(p?defSell(p):'');
      const qty=row.qty||1;
      const tot=sr!==''?(parseFloat(sr)*qty).toFixed(2):'';
      const action=idx===0
        ?`<button class="s-add-btn" onclick="addRow('${cat}')">+</button>`
        :`<button class="s-rem-btn" onclick="remRow('${cat}','${row.rowId}')">×</button>`;
      const opts=(products[cat]||[]).map(pr=>`<option value="${pr.id}"${row.productId===pr.id?' selected':''}>${getLabel(pr,cat)}</option>`).join('');
      h+=`<div class="s-row" id="sr-${row.rowId}">
        <select class="s-select" onchange="onDrop('${cat}','${row.rowId}',this.value)">
          <option value="">-- Chunein --</option>${opts}
        </select>
        <div class="s-base">${br!==null?'₹'+br:'—'}</div>
        <input class="s-sell-inp" type="number" id="sell-${row.rowId}" value="${sr!==''?sr:''}" placeholder="—" ${!p?'disabled':''} step="0.5" onchange="onSell('${cat}','${row.rowId}',this.value)">
        <input class="s-qty-inp" type="number" id="qty-${row.rowId}" value="${qty}" min="0.01" step="0.01" ${!p?'disabled':''} onchange="onQty('${cat}','${row.rowId}',this.value)">
        <div class="s-total" id="tot-${row.rowId}">${tot!==''?'₹'+tot:'—'}</div>
        <div>${action}</div>
      </div>`;
    });
    if(rows[cat].length>1)h+=`<button class="s-more-btn" onclick="addRow('${cat}')">+ Add</button>`;
    h+=`</div></div>`;
  });
  // Summary
  let tb=0,ts=0,any=false;
  ordCats().forEach(cat=>{
    (rows[cat]||[]).forEach(row=>{
      const p=row.productId?findP(cat,row.productId):null;
      if(!p)return;
      const sr=row.sellingRate!==''?parseFloat(row.sellingRate):defSell(p);
      const qty=parseFloat(row.qty)||1;
      tb+=p.baseRate*qty; ts+=sr*qty; any=true;
    });
  });
  const margin=any?((ts-tb)/tb*100):0;
  const ms=any?margin.toFixed(1)+'%':'—';
  let dc=any&&margin<15?'var(--danger)':any&&margin>=20?'var(--gold)':'var(--success)';
  let dm=any&&margin<15?'❌ Deal mat karo!':any&&margin>=20?'🌟 Bahut achha!':'✅ Deal ho sakti hai';
  h+=`<div class="summary">
    <div class="summary-grid">
      <div class="sum-item"><div class="sum-label">Base Total</div><div class="sum-val">₹${any?Math.round(tb):'—'}</div></div>
      <div class="sum-item"><div class="sum-label">Sell Total</div><div class="sum-val">₹${any?Math.round(ts):'—'}</div></div>
      <div class="sum-item"><div class="sum-label">Margin</div><div class="sum-val" style="color:${dc};">${ms}</div></div>
    </div>
    <div class="deal-msg" style="background:${any&&margin<15?'rgba(231,76,60,.15)':any&&margin>=20?'rgba(201,168,76,.15)':'rgba(39,174,96,.15)'};color:${dc};">${any?dm:''}</div>
  </div>`;
  c.innerHTML=h;
}

window.addRow=function(cat){rows[cat].push({rowId:cat+'-r'+Date.now(),productId:'',sellingRate:'',qty:1});renderSalesman();};
window.remRow=function(cat,rid){rows[cat]=rows[cat].filter(r=>r.rowId!==rid);renderSalesman();};
window.onDrop=function(cat,rid,pid){
  const row=(rows[cat]||[]).find(r=>r.rowId===rid);
  if(!row)return;
  row.productId=pid;row.sellingRate='';row.qty=1;
  renderSalesman();
};
window.onSell=function(cat,rid,v){
  const row=(rows[cat]||[]).find(r=>r.rowId===rid);if(!row)return;
  const num=parseFloat(v);if(isNaN(num))return;
  row.sellingRate=num;
  const qty=parseFloat(row.qty)||1;
  const tel=document.getElementById('tot-'+rid);
  if(tel)tel.textContent='₹'+(num*qty).toFixed(2);
  updateSummary();
};
window.onQty=function(cat,rid,v){
  const row=(rows[cat]||[]).find(r=>r.rowId===rid);if(!row)return;
  const qty=parseFloat(v)||1;row.qty=qty;
  const p=findP(cat,row.productId);if(!p)return;
  const sr=row.sellingRate!==''?parseFloat(row.sellingRate):defSell(p);
  const tel=document.getElementById('tot-'+rid);
  if(tel)tel.textContent='₹'+(sr*qty).toFixed(2);
  updateSummary();
};

function updateSummary(){
  let tb=0,ts=0,any=false;
  ordCats().forEach(cat=>{
    (rows[cat]||[]).forEach(row=>{
      const p=row.productId?findP(cat,row.productId):null;if(!p)return;
      const sr=row.sellingRate!==''?parseFloat(row.sellingRate):defSell(p);
      const qty=parseFloat(row.qty)||1;
      tb+=p.baseRate*qty;ts+=sr*qty;any=true;
    });
  });
  const margin=any?((ts-tb)/tb*100):0;
  const ms=any?margin.toFixed(1)+'%':'—';
  let dc=any&&margin<15?'var(--danger)':any&&margin>=20?'var(--gold)':'var(--success)';
  let dm=any&&margin<15?'❌ Deal mat karo!':any&&margin>=20?'🌟 Bahut achha!':'✅ Deal ho sakti hai';
  const sel=document.querySelector('.summary');
  if(sel)sel.innerHTML=`
    <div class="summary-grid">
      <div class="sum-item"><div class="sum-label">Base Total</div><div class="sum-val">₹${any?Math.round(tb):'—'}</div></div>
      <div class="sum-item"><div class="sum-label">Sell Total</div><div class="sum-val">₹${any?Math.round(ts):'—'}</div></div>
      <div class="sum-item"><div class="sum-label">Margin</div><div class="sum-val" style="color:${dc};">${ms}</div></div>
    </div>
    <div class="deal-msg" style="background:${any&&margin<15?'rgba(231,76,60,.15)':any&&margin>=20?'rgba(201,168,76,.15)':'rgba(39,174,96,.15)'};color:${dc};">${any?dm:''}</div>`;
}

window.saveProduct=async function(){
  let cat=document.getElementById('addCategory').value;
  if(!cat){toast('Category chunein!');return;}
  const br=parseFloat(document.getElementById('addBaseRate').value);
  if(isNaN(br)||br<=0){toast('Base rate daalen!');return;}
  let np={baseRate:br,pct:15},ck=cat;
  if(cat==='new'){
    const nm=document.getElementById('newCatName').value.trim();
    if(!nm){toast('Category naam daalen!');return;}
    ck=nm.toLowerCase().replace(/\s+/g,'_');
    categoryMeta[ck]={label:'📦 '+nm};
    np.name=document.getElementById('af_name')?.value?.trim()||'Product';
    np.id=ck+'-'+Date.now();
  }else if(cat==='frame'){
    const b=document.getElementById('af_brand')?.value?.trim(),g=document.getElementById('af_gsm')?.value,t=document.getElementById('af_th')?.value?.trim();
    if(!b||!g||!t){toast('Saari details bharo!');return;}
    np={...np,brand:b,gsm:parseFloat(g),thickness:t,id:'f-'+Date.now()};
  }else if(cat==='steel'){
    const g=document.getElementById('af_grade')?.value?.trim(),s=document.getElementById('af_size')?.value?.trim();
    if(!g||!s){toast('Grade aur Size daalen!');return;}
    np={...np,grade:g,size:s,id:'s-'+Date.now()};
  }else if(cat==='kabje'){
    const t=document.getElementById('af_type')?.value,s=document.getElementById('af_size')?.value?.trim();
    if(!s){toast('Size daalen!');return;}
    np={...np,type:t,size:s,id:'k-'+Date.now()};
  }else if(cat==='pvc'){
    const t=document.getElementById('af_type')?.value,s=document.getElementById('af_size')?.value?.trim();
    if(!s){toast('Size daalen!');return;}
    np={...np,type:t,size:s,id:'p-'+Date.now()};
  }else{
    const n=document.getElementById('af_name')?.value?.trim();
    if(!n){toast('Naam daalen!');return;}
    np={...np,name:n,id:cat+'-'+Date.now()};
  }
  if(!products[ck])products[ck]=[];
  products[ck].push(np);
  await saveFB();closeAddModal();toast('✅ Product add ho gaya!');
};
document.getElementById('addModal').addEventListener('click',function(e){if(e.target===this)closeAddModal();});
</script>
</body>
</html>
